<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BlackRoad Files — sovereign file manager for BlackRoad OS.">
  <meta name="theme-color" content="#0a0a0a">
  <title>BlackRoad Files</title>
  <link rel="stylesheet" href="/_shared/design.css">
  <style>
    /* ── File Manager Layout ── */
    .fm-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--sp-lg);
      min-height: calc(100vh - var(--nav-height) - 60px);
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ── */
    .fm-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-md);
      padding: var(--sp-md) 0;
      flex-wrap: wrap;
    }
    .fm-toolbar-left {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
    }
    .fm-toolbar-right {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
    }
    .fm-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius-btn);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--secondary);
      font-family: var(--font-body);
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .fm-btn:hover {
      border-color: var(--border-hover);
      color: var(--white);
    }
    .fm-btn.active {
      border-color: var(--violet);
      color: var(--white);
    }
    .fm-btn.primary {
      background: var(--grad);
      border: none;
      color: var(--white);
      font-weight: 600;
    }
    .fm-btn.primary:hover { opacity: 0.9; }
    .fm-btn.danger:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    /* ── Breadcrumbs ── */
    .fm-breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--subtle);
      padding: var(--sp-sm) 0;
      flex-wrap: wrap;
    }
    .fm-breadcrumb span {
      cursor: pointer;
      transition: color 0.2s;
    }
    .fm-breadcrumb span:hover { color: var(--white); }
    .fm-breadcrumb span.current { color: var(--secondary); cursor: default; }
    .fm-breadcrumb .sep { color: var(--dim); cursor: default; }

    /* ── Sort Bar ── */
    .fm-sort-bar {
      display: flex;
      align-items: center;
      gap: var(--sp-md);
      padding: var(--sp-sm) 0;
      font-size: 0.7rem;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .fm-sort-btn {
      cursor: pointer;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 4px 0;
    }
    .fm-sort-btn:hover, .fm-sort-btn.active { color: var(--white); }

    /* ── File Grid ── */
    .fm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: var(--sp-md);
      padding: var(--sp-md) 0;
      flex: 1;
    }
    .fm-grid.list-view {
      grid-template-columns: 1fr;
      gap: 2px;
    }

    /* ── File Item (Grid) ── */
    .fm-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: var(--sp-md);
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s var(--ease-spring);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-sm);
      text-align: center;
      position: relative;
    }
    .fm-item:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }
    .fm-item .fm-icon { font-size: 2rem; line-height: 1; }
    .fm-item .fm-name {
      font-size: 0.8rem;
      color: var(--secondary);
      word-break: break-all;
      font-weight: 500;
    }
    .fm-item .fm-meta {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
    }
    .fm-item .fm-delete {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--dim);
      font-size: 12px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, background 0.2s;
    }
    .fm-item:hover .fm-delete { display: flex; }
    .fm-item .fm-delete:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

    /* ── File Item (List) ── */
    .fm-grid.list-view .fm-item {
      flex-direction: row;
      align-items: center;
      text-align: left;
      padding: var(--sp-sm) var(--sp-md);
      border-radius: var(--radius-small);
      gap: var(--sp-md);
      transform: none;
    }
    .fm-grid.list-view .fm-item:hover { transform: none; background: rgba(255,255,255,0.02); }
    .fm-grid.list-view .fm-icon { font-size: 1.2rem; flex-shrink: 0; }
    .fm-grid.list-view .fm-name { flex: 1; }
    .fm-grid.list-view .fm-meta { white-space: nowrap; }
    .fm-grid.list-view .fm-item .fm-delete { position: static; display: flex; opacity: 0; }
    .fm-grid.list-view .fm-item:hover .fm-delete { opacity: 1; }
    .fm-list-size {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      min-width: 70px;
      text-align: right;
      display: none;
    }
    .fm-grid.list-view .fm-list-size { display: block; }

    /* ── Storage Bar ── */
    .fm-storage {
      padding: var(--sp-md) 0;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
    .fm-storage-info {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: var(--sp-xs);
    }

    /* ── Modal ── */
    .fm-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: var(--sp-lg);
    }
    .fm-modal-overlay.open { display: flex; }
    .fm-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-large);
      width: 100%;
      max-width: 560px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .fm-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-md) var(--sp-lg);
      border-bottom: 1px solid var(--border);
    }
    .fm-modal-header h3 {
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
    }
    .fm-modal-close {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: none;
      color: var(--subtle);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .fm-modal-close:hover { border-color: var(--muted); color: var(--white); }
    .fm-modal-body { padding: var(--sp-lg); }
    .fm-modal-meta {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--sp-sm) var(--sp-lg);
      font-size: 0.8rem;
      margin-bottom: var(--sp-lg);
    }
    .fm-modal-meta dt {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .fm-modal-meta dd { color: var(--secondary); }
    .fm-preview {
      background: var(--inset);
      border: 1px solid var(--border);
      border-radius: var(--radius-small);
      padding: var(--sp-md);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--tertiary);
      line-height: 1.7;
      max-height: 240px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    /* ── Empty State ── */
    .fm-empty {
      text-align: center;
      padding: var(--sp-2xl) var(--sp-lg);
      color: var(--muted);
    }
    .fm-empty-icon { font-size: 2.5rem; margin-bottom: var(--sp-md); }

    /* ── Upload hidden input ── */
    #uploadInput { display: none; }

    @media (max-width: 560px) {
      .fm-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .fm-toolbar { flex-direction: column; align-items: stretch; }
      .fm-toolbar-left, .fm-toolbar-right { justify-content: center; flex-wrap: wrap; }
    }
  </style>

    };

    // ── State ──
    let currentPath = '/home/blackroad';
    let viewMode = 'grid'; // grid | list
    let sortField = 'name'; // name | size | date
    let sortAsc = true;

    // ── Helpers ──
    function loadFS() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try { return JSON.parse(raw); }
        catch { /* fall through */ }
      }
      // Seed defaults
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_FS));
      return { ...DEFAULT_FS };
    }

    function saveFS(fs) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(fs));
    }

    function formatSize(bytes) {
      if (bytes === 0) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const now = new Date();
      const diff = now - d;
      if (diff < 86400000) {
        const hrs = Math.floor(diff / 3600000);
        return hrs < 1 ? 'Just now' : hrs + 'h ago';
      }
      if (diff < 604800000) {
        return Math.floor(diff / 86400000) + 'd ago';
      }
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function getFileIcon(name, isFolder) {
      if (isFolder) return '\uD83D\uDCC1';
      const ext = name.split('.').pop().toLowerCase();
      const map = {
        py: '\uD83D\uDC0D', sh: '\uD83D\uDCDC', md: '\uD83D\uDCC4', db: '\uD83D\uDDC3\uFE0F',
        log: '\uD83D\uDCCB', gguf: '\uD83E\uDDE0', json: '\uD83D\uDCCE', txt: '\uD83D\uDCC4',
        html: '\uD83C\uDF10', css: '\uD83C\uDFA8', js: '\u26A1', toml: '\u2699\uFE0F',
        yml: '\u2699\uFE0F', yaml: '\u2699\uFE0F', sol: '\u26D3\uFE0F',
      };
      return map[ext] || '\uD83D\uDCC4';
    }

    function getExtension(name) {
      const i = name.lastIndexOf('.');
      return i > 0 ? name.slice(i + 1).toUpperCase() : 'FILE';
    }

    function getStorageUsed(fs) {
      return JSON.stringify(fs).length;
    }

    // ── Derive entries for current path ──
    function getEntries(fs) {
      const folders = new Set();
      const files = [];
      const prefix = currentPath.endsWith('/') ? currentPath : currentPath + '/';

      for (const [path, meta] of Object.entries(fs)) {
        if (!path.startsWith(prefix)) continue;
        const rest = path.slice(prefix.length);
        const slashIdx = rest.indexOf('/');
        if (slashIdx === -1) {
          // Direct file
          files.push({ name: rest, path, isFolder: false, size: meta.size, modified: meta.modified });
        } else {
          // Subfolder
          folders.add(rest.slice(0, slashIdx));
        }
      }

      const folderEntries = [...folders].map(name => {
        // Compute folder size + most recent modified
        const fp = prefix + name + '/';
        let totalSize = 0;
        let latestMod = '1970-01-01T00:00:00Z';
        for (const [p, m] of Object.entries(fs)) {
          if (p.startsWith(fp)) {
            totalSize += m.size;
            if (m.modified > latestMod) latestMod = m.modified;
          }
        }
        return { name, path: prefix + name, isFolder: true, size: totalSize, modified: latestMod };
      });

      let all = [...folderEntries, ...files];

      // Sort
      all.sort((a, b) => {
        // Folders always first
        if (a.isFolder !== b.isFolder) return a.isFolder ? -1 : 1;
        let cmp = 0;
        if (sortField === 'name') cmp = a.name.localeCompare(b.name);
        else if (sortField === 'size') cmp = a.size - b.size;
        else if (sortField === 'date') cmp = new Date(a.modified) - new Date(b.modified);
        return sortAsc ? cmp : -cmp;
      });

      return all;
    }

    // ── Render ──
    function render() {
      const fs = loadFS();
      renderBreadcrumb();
      renderGrid(fs);
      renderStorage(fs);
    }

    function renderBreadcrumb() {
      const el = document.getElementById('breadcrumb');
      const parts = currentPath.split('/').filter(Boolean);
      let html = '';
      let accumulated = '';
      parts.forEach((part, i) => {
        accumulated += '/' + part;
        const isCurrent = i === parts.length - 1;
        if (i > 0) html += '<span class="sep">/</span>';
        if (isCurrent) {
          html += `<span class="current">${part}</span>`;
        } else {
          const p = accumulated;
          html += `<span onclick="navigate('${p}')">${part}</span>`;
        }
      });
      el.innerHTML = html;
    }

    function renderGrid(fs) {
      const grid = document.getElementById('fileGrid');
      const entries = getEntries(fs);

      if (viewMode === 'list') {
        grid.classList.add('list-view');
      } else {
        grid.classList.remove('list-view');
      }

      if (entries.length === 0) {
        grid.innerHTML = `
          <div class="fm-empty" style="grid-column: 1 / -1;">
            <div class="fm-empty-icon">\uD83D\uDCC2</div>
            <p>Empty folder</p>
          </div>`;
        return;
      }

      grid.innerHTML = entries.map(e => `
        <div class="fm-item" onclick="${e.isFolder ? `navigate('${e.path}')` : `preview('${e.path}')`}">
          <div class="fm-icon">${getFileIcon(e.name, e.isFolder)}</div>
          <div class="fm-name">${e.name}</div>
          <div class="fm-list-size">${formatSize(e.size)}</div>
          <div class="fm-meta">${e.isFolder ? formatSize(e.size) : getExtension(e.name)} &middot; ${formatDate(e.modified)}</div>
          ${!e.isFolder ? `<button class="fm-delete" onclick="event.stopPropagation(); deleteFile('${e.path}')" title="Delete">&times;</button>` : `<button class="fm-delete" onclick="event.stopPropagation(); deleteFolder('${e.path}')" title="Delete folder">&times;</button>`}
        </div>
      `).join('');
    }

    function renderStorage(fs) {
      const used = getStorageUsed(fs);
      const pct = Math.min((used / MAX_STORAGE) * 100, 100);
      document.getElementById('storageUsed').textContent = formatSize(used) + ' used';
      document.getElementById('storageTotal').textContent = formatSize(MAX_STORAGE) + ' total';
      document.getElementById('storageFill').style.width = pct.toFixed(1) + '%';
    }

    // ── Navigation ──
    function navigate(path) {
      currentPath = path;
      render();
    }

    // ── Preview Modal ──
    function preview(path) {
      const fs = loadFS();
      const meta = fs[path];
      if (!meta) return;
      const name = path.split('/').pop();
      const ext = getExtension(name);

      document.getElementById('modalTitle').innerHTML =
        `<span>${getFileIcon(name, false)}</span> ${name}`;

      document.getElementById('modalMeta').innerHTML = `
        <dt>Path</dt><dd class="mono" style="font-size:0.75rem;color:var(--tertiary)">${path}</dd>
        <dt>Size</dt><dd>${formatSize(meta.size)}</dd>
        <dt>Modified</dt><dd>${new Date(meta.modified).toLocaleString()}</dd>
        <dt>Type</dt><dd>${ext} file</dd>
      `;

      document.getElementById('modalPreview').textContent = meta.content || '[No preview available]';
      document.getElementById('previewModal').classList.add('open');
    }

    // ── Close modal ──
    document.getElementById('modalClose').addEventListener('click', () => {
      document.getElementById('previewModal').classList.remove('open');
    });
    document.getElementById('previewModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.remove('open');
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('previewModal').classList.remove('open');
      }
    });

    // ── Upload ──
    document.getElementById('btnUpload').addEventListener('click', () => {
      document.getElementById('uploadInput').click();
    });
    document.getElementById('uploadInput').addEventListener('change', (e) => {
      const fs = loadFS();
      const prefix = currentPath.endsWith('/') ? currentPath : currentPath + '/';
      for (const file of e.target.files) {
        const reader = new FileReader();
        reader.onload = () => {
          const content = reader.result;
          const path = prefix + file.name;
          fs[path] = {
            size: file.size,
            modified: new Date().toISOString(),
            content: content.length > 10000
              ? content.slice(0, 10000) + '\n\n[Truncated — showing first 10KB]'
              : content
          };
          saveFS(fs);
          render();
        };
        reader.readAsText(file);
      }
      e.target.value = '';
    });

    // ── New Folder ──
    document.getElementById('btnNewFolder').addEventListener('click', () => {
      const name = prompt('Folder name:');
      if (!name || !name.trim()) return;
      const clean = name.trim().replace(/[\/\\]/g, '');
      if (!clean) return;
      const fs = loadFS();
      const prefix = currentPath.endsWith('/') ? currentPath : currentPath + '/';
      const placeholder = prefix + clean + '/.keep';
      fs[placeholder] = { size: 0, modified: new Date().toISOString(), content: '' };
      saveFS(fs);
      render();
    });

    // ── Delete ──
    function deleteFile(path) {
      if (!confirm('Delete ' + path.split('/').pop() + '?')) return;
      const fs = loadFS();
      delete fs[path];
      saveFS(fs);
      render();
    }

    function deleteFolder(folderPath) {
      const name = folderPath.split('/').pop();
      if (!confirm('Delete folder "' + name + '" and all contents?')) return;
      const fs = loadFS();
      const prefix = folderPath.endsWith('/') ? folderPath : folderPath + '/';
      for (const key of Object.keys(fs)) {
        if (key.startsWith(prefix)) delete fs[key];
      }
      saveFS(fs);
      render();
    }

    // ── View Toggle ──
    document.getElementById('btnGrid').addEventListener('click', () => {
      viewMode = 'grid';
      document.getElementById('btnGrid').classList.add('active');
      document.getElementById('btnList').classList.remove('active');
      render();
    });
    document.getElementById('btnList').addEventListener('click', () => {
      viewMode = 'list';
      document.getElementById('btnList').classList.add('active');
      document.getElementById('btnGrid').classList.remove('active');
      render();
    });

    // ── Sort ──
    document.querySelectorAll('.fm-sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const field = btn.dataset.sort;
        if (!field) return;
        if (sortField === field) {
          sortAsc = !sortAsc;
        } else {
          sortField = field;
          sortAsc = true;
        }
        document.querySelectorAll('.fm-sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    // ── Init ──
    render();
  </script>
</body>
