<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlackRoad Status — System Health</title>
  <meta name="description" content="Real-time system status for BlackRoad OS infrastructure, fleet nodes, and services.">
  <meta name="theme-color" content="#0a0a0a">
  <meta property="og:title" content="BlackRoad Status">
  <meta property="og:description" content="Real-time system status for BlackRoad OS infrastructure.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://blackroad.io/status.html">
  <link rel="canonical" href="https://blackroad.io/status.html">
  <link rel="stylesheet" href="/_shared/design.css">
  <style>
    /* ── Status Page Layout ── */
    .status-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 var(--sp-lg);
    }

    /* ── Overall Banner ── */
    .overall-banner {
      display: flex;
      align-items: center;
      gap: var(--sp-md);
      padding: var(--sp-lg) var(--sp-xl);
      border-radius: var(--radius-large);
      background: var(--surface);
      border: 1px solid var(--border);
      margin-top: var(--sp-xl);
    }
    .overall-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .overall-dot.green {
      background: #22c55e;
      box-shadow: 0 0 12px rgba(34,197,94,0.4), 0 0 24px rgba(34,197,94,0.15);
      animation: pulse-overall 2.5s ease-in-out infinite;
    }
    .overall-dot.yellow {
      background: #f59e0b;
      box-shadow: 0 0 12px rgba(245,158,11,0.4);
    }
    .overall-dot.red {
      background: #ef4444;
      box-shadow: 0 0 12px rgba(239,68,68,0.4);
    }
    @keyframes pulse-overall {
      0%, 100% { box-shadow: 0 0 12px rgba(34,197,94,0.4), 0 0 24px rgba(34,197,94,0.15); }
      50% { box-shadow: 0 0 16px rgba(34,197,94,0.6), 0 0 32px rgba(34,197,94,0.2); }
    }
    .overall-text {
      font-family: var(--font-headline);
      font-size: 1.35rem;
      font-weight: 700;
    }
    .overall-sub {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-align: right;
      line-height: 1.6;
    }

    /* ── Uptime Row ── */
    .uptime-row {
      display: flex;
      gap: var(--sp-md);
      margin-top: var(--sp-lg);
    }
    .uptime-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: var(--sp-md) var(--sp-lg);
      text-align: center;
    }
    .uptime-value {
      font-family: var(--font-mono);
      font-size: 1.75rem;
      font-weight: 700;
    }
    .uptime-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Section Header ── */
    .section-head {
      margin-top: var(--sp-xl);
      margin-bottom: var(--sp-md);
    }

    /* ── Service Grid ── */
    .service-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-md);
    }
    .service-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: var(--sp-lg);
      transition: border-color 0.2s;
    }
    .service-card:hover {
      border-color: var(--border-hover);
    }
    .service-header {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      margin-bottom: var(--sp-sm);
    }
    .service-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .service-dot.green { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.4); }
    .service-dot.yellow { background: #f59e0b; }
    .service-dot.red { background: #ef4444; }
    .service-name {
      font-family: var(--font-headline);
      font-size: 0.9rem;
      font-weight: 600;
    }
    .service-detail {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--subtle);
    }

    /* ── Node Grid ── */
    .node-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--sp-md);
    }
    .node-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: var(--sp-lg);
      transition: border-color 0.2s;
    }
    .node-card:hover {
      border-color: var(--border-hover);
    }
    .node-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-md);
    }
    .node-name {
      font-family: var(--font-headline);
      font-size: 1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
    }
    .node-role {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .node-stats {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .node-stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
    }
    .node-stat-label {
      color: var(--subtle);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .node-stat-value {
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    /* ── Temp Gauge ── */
    .temp-gauge {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      width: 100%;
    }
    .temp-bar-bg {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .temp-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s var(--ease-spring), background 0.3s;
    }
    .temp-bar-fill.cool { background: #22c55e; }
    .temp-bar-fill.warm { background: #f59e0b; }
    .temp-bar-fill.hot { background: #ef4444; }
    .temp-val {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      min-width: 42px;
      text-align: right;
    }
    .temp-val.cool { color: #22c55e; }
    .temp-val.warm { color: #f59e0b; }
    .temp-val.hot { color: #ef4444; }

    /* ── Disk Bar ── */
    .disk-bar-bg {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .disk-bar-fill {
      height: 100%;
      background: var(--grad);
      border-radius: 3px;
      transition: width 0.6s var(--ease-spring);
    }

    /* ── Skeleton overrides ── */
    .skel-text {
      height: 14px;
      width: 80px;
      display: inline-block;
    }
    .skel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .skel-bar {
      height: 6px;
      width: 100%;
    }
    .skel-big {
      height: 24px;
      width: 120px;
    }

    /* ── Last Updated ── */
    .last-checked {
      text-align: center;
      margin-top: var(--sp-lg);
      margin-bottom: var(--sp-xl);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--dim);
    }
    .last-checked span {
      color: var(--subtle);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .service-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .node-grid {
        grid-template-columns: 1fr;
      }
      .uptime-row {
        flex-direction: column;
      }
    }
    @media (max-width: 560px) {
      .service-grid {
        grid-template-columns: 1fr;
      }
      .overall-banner {
        flex-direction: column;
        text-align: center;
        padding: var(--sp-lg);
      }
      .overall-sub {
        margin-left: 0;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <!-- ── Nav ── -->
  <nav class="br-nav">
    <a href="/" class="nav-brand">
      <div class="spectrum-mark">
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      BlackRoad Status
    </a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/dashboard.html">Dashboard</a>
    </div>
  </nav>

  <div class="grad-bar"></div>

  <main class="status-wrap">

    <!-- ── Overall Banner ── -->
    <div class="overall-banner" id="overall-banner">
      <div class="overall-dot skeleton" id="overall-dot"></div>
      <div>
        <div class="overall-text" id="overall-text">
          <span class="skeleton skel-big">&nbsp;</span>
        </div>
      </div>
      <div class="overall-sub" id="overall-sub">
        <span class="skeleton skel-text">&nbsp;</span>
      </div>
    </div>

    <!-- ── Uptime Row ── -->
    <div class="uptime-row" id="uptime-row">
      <div class="uptime-card">
        <div class="uptime-value" id="uptime-days"><span class="skeleton skel-text">&nbsp;</span></div>
        <div class="uptime-label">Uptime (days)</div>
      </div>
      <div class="uptime-card">
        <div class="uptime-value" id="nodes-online"><span class="skeleton skel-text">&nbsp;</span></div>
        <div class="uptime-label">Nodes Online</div>
      </div>
      <div class="uptime-card">
        <div class="uptime-value" id="total-services"><span class="skeleton skel-text">&nbsp;</span></div>
        <div class="uptime-label">Services</div>
      </div>
    </div>

    <!-- ── Services ── -->
    <div class="section-head">
      <div class="section-label">Services</div>
      <div class="grad-bar"></div>
    </div>

    <div class="service-grid" id="service-grid">
      <div class="service-card"><div class="service-header"><span class="skeleton skel-dot">&nbsp;</span><span class="skeleton skel-text">&nbsp;</span></div><div class="skeleton skel-text" style="width:60%">&nbsp;</div></div>
      <div class="service-card"><div class="service-header"><span class="skeleton skel-dot">&nbsp;</span><span class="skeleton skel-text">&nbsp;</span></div><div class="skeleton skel-text" style="width:60%">&nbsp;</div></div>
      <div class="service-card"><div class="service-header"><span class="skeleton skel-dot">&nbsp;</span><span class="skeleton skel-text">&nbsp;</span></div><div class="skeleton skel-text" style="width:60%">&nbsp;</div></div>
      <div class="service-card"><div class="service-header"><span class="skeleton skel-dot">&nbsp;</span><span class="skeleton skel-text">&nbsp;</span></div><div class="skeleton skel-text" style="width:60%">&nbsp;</div></div>
      <div class="service-card"><div class="service-header"><span class="skeleton skel-dot">&nbsp;</span><span class="skeleton skel-text">&nbsp;</span></div><div class="skeleton skel-text" style="width:60%">&nbsp;</div></div>
      <div class="service-card"><div class="service-header"><span class="skeleton skel-dot">&nbsp;</span><span class="skeleton skel-text">&nbsp;</span></div><div class="skeleton skel-text" style="width:60%">&nbsp;</div></div>
    </div>

    <!-- ── Fleet Nodes ── -->
    <div class="section-head">
      <div class="section-label">Fleet Nodes</div>
      <div class="grad-bar"></div>
    </div>

    <div class="node-grid" id="node-grid">
      <div class="node-card"><div class="node-top"><span class="skeleton skel-text">&nbsp;</span><span class="skeleton skel-text" style="width:50px">&nbsp;</span></div><div class="node-stats"><div class="skeleton skel-bar">&nbsp;</div><div class="skeleton skel-bar">&nbsp;</div><div class="skeleton skel-bar">&nbsp;</div></div></div>
      <div class="node-card"><div class="node-top"><span class="skeleton skel-text">&nbsp;</span><span class="skeleton skel-text" style="width:50px">&nbsp;</span></div><div class="node-stats"><div class="skeleton skel-bar">&nbsp;</div><div class="skeleton skel-bar">&nbsp;</div><div class="skeleton skel-bar">&nbsp;</div></div></div>
    </div>

    <!-- ── Last Checked ── -->
    <div class="last-checked">
      Last checked: <span id="last-checked">--</span>
    </div>

  </main>

  <!-- ── Footer ── -->
  <div class="grad-bar"></div>
  <footer>
    <span>BlackRoad OS, Inc. &middot; Delaware C-Corp &middot; Est. Nov 2025</span>
    <span class="live-indicator">Live</span>
  </footer>

  <script>
    const API = 'https://blackroad-live-stats.amundsonalexa.workers.dev/api/stats';
    let firstLoad = true;

    function tempClass(c) {
      if (c < 50) return 'cool';
      if (c < 65) return 'warm';
      return 'hot';
    }

    function statusDot(ok) {
      return ok ? 'green' : 'red';
    }

    function formatTime(d) {
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function formatDate(d) {
      return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderServices(data) {
      const fleet = data.fleet || {};
      const repos = data.repos || {};
      const search = data.search || {};
      const infra = data.infra || {};
      const agents = data.agents || {};

      const nodesOnline = fleet.nodes_online || 0;
      const nodesTotal = fleet.total || 0;
      const fleetOk = nodesOnline > 0;

      const agentCount = agents.total || agents.count || 0;
      const aiOk = agentCount > 0;

      const giteaRepos = repos.gitea_repos || 0;
      const gitOk = giteaRepos > 0;

      const searchIndexed = search.total_indexed || 0;
      const searchOk = searchIndexed > 0;

      const domainCount = Array.isArray(infra.domains) ? infra.domains.length : (infra.domains || 0);
      const dnsOk = domainCount > 0;

      const workerCount = Array.isArray(infra.workers) ? infra.workers.length : (infra.workers || 0);
      const workersOk = workerCount > 0;

      const services = [
        { name: 'Fleet Nodes', ok: fleetOk, detail: nodesOnline + '/' + nodesTotal + ' online' },
        { name: 'AI Engine', ok: aiOk, detail: agentCount + ' agents active' },
        { name: 'Git (Gitea)', ok: gitOk, detail: giteaRepos + ' repositories' },
        { name: 'Search Index', ok: searchOk, detail: searchIndexed.toLocaleString() + ' entries indexed' },
        { name: 'DNS', ok: dnsOk, detail: domainCount + ' domains' },
        { name: 'Workers', ok: workersOk, detail: workerCount + ' deployed' },
      ];

      const allOk = services.every(function(s) { return s.ok; });
      const allDown = services.every(function(s) { return !s.ok; });

      // Overall banner
      var dot = document.getElementById('overall-dot');
      var text = document.getElementById('overall-text');
      var sub = document.getElementById('overall-sub');
      dot.className = 'overall-dot';

      if (allOk) {
        dot.classList.add('green');
        text.textContent = 'All Systems Operational';
      } else if (allDown) {
        dot.classList.add('red');
        text.textContent = 'Major Outage';
      } else {
        dot.classList.add('yellow');
        text.textContent = 'Partial Degradation';
      }

      var now = new Date();
      sub.innerHTML = formatDate(now) + '<br>' + formatTime(now);

      // Uptime
      var uptimeSec = data.uptime_seconds || fleet.uptime_seconds || 0;
      var uptimeDays = Math.floor(uptimeSec / 86400);
      document.getElementById('uptime-days').textContent = uptimeDays;
      document.getElementById('nodes-online').textContent = nodesOnline + '/' + nodesTotal;

      // Total services across nodes
      var totalSvc = 0;
      if (fleet.nodes && Array.isArray(fleet.nodes)) {
        fleet.nodes.forEach(function(n) { totalSvc += (n.services || 0); });
      }
      document.getElementById('total-services').textContent = totalSvc || '--';

      // Service grid
      var grid = document.getElementById('service-grid');
      grid.innerHTML = services.map(function(s) {
        return '<div class="service-card">' +
          '<div class="service-header">' +
            '<span class="service-dot ' + (s.ok ? 'green' : 'red') + '"></span>' +
            '<span class="service-name">' + s.name + '</span>' +
          '</div>' +
          '<div class="service-detail">' + s.detail + '</div>' +
        '</div>';
      }).join('');
    }

    function renderNodes(data) {
      var fleet = data.fleet || {};
      var nodes = fleet.nodes || [];

      if (!nodes.length) {
        document.getElementById('node-grid').innerHTML =
          '<div class="node-card" style="grid-column:1/-1;text-align:center;color:var(--muted);padding:var(--sp-xl)">' +
            'No node data available' +
          '</div>';
        return;
      }

      document.getElementById('node-grid').innerHTML = nodes.map(function(node) {
        var online = node.status === 'online' || node.online === true;
        var dotColor = statusDot(online);
        var temp = node.temp_c || node.temperature || 0;
        var tc = tempClass(temp);
        var tempPct = Math.min((temp / 85) * 100, 100);
        var diskPct = node.disk_percent || node.disk_usage || 0;
        var load = node.load_avg || node.load || '--';
        var svc = node.services || node.services_count || 0;
        var role = node.role || node.type || 'node';
        var name = node.name || node.hostname || 'Unknown';

        return '<div class="node-card">' +
          '<div class="node-top">' +
            '<div class="node-name">' +
              '<span class="service-dot ' + dotColor + '"></span>' +
              name +
            '</div>' +
            '<div class="node-role">' + role + '</div>' +
          '</div>' +
          '<div class="node-stats">' +
            '<div>' +
              '<div class="node-stat-row">' +
                '<span class="node-stat-label">Temperature</span>' +
              '</div>' +
              '<div class="temp-gauge">' +
                '<div class="temp-bar-bg">' +
                  '<div class="temp-bar-fill ' + tc + '" style="width:' + tempPct + '%"></div>' +
                '</div>' +
                '<span class="temp-val ' + tc + '">' + (temp > 0 ? temp.toFixed(1) + '\u00B0C' : '--') + '</span>' +
              '</div>' +
            '</div>' +
            '<div>' +
              '<div class="node-stat-row">' +
                '<span class="node-stat-label">Disk Usage</span>' +
                '<span class="node-stat-value">' + (diskPct > 0 ? diskPct.toFixed(1) + '%' : '--') + '</span>' +
              '</div>' +
              '<div class="disk-bar-bg">' +
                '<div class="disk-bar-fill" style="width:' + diskPct + '%"></div>' +
              '</div>' +
            '</div>' +
            '<div class="node-stat-row">' +
              '<span class="node-stat-label">Load Avg</span>' +
              '<span class="node-stat-value">' + (typeof load === 'number' ? load.toFixed(2) : load) + '</span>' +
            '</div>' +
            '<div class="node-stat-row">' +
              '<span class="node-stat-label">Services</span>' +
              '<span class="node-stat-value">' + svc + '</span>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    async function poll() {
      try {
        var res = await fetch(API);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();

        renderServices(data);
        renderNodes(data);

        document.getElementById('last-checked').textContent = formatTime(new Date());
        firstLoad = false;
      } catch (err) {
        console.error('Status fetch failed:', err);
        if (firstLoad) {
          var dot = document.getElementById('overall-dot');
          var text = document.getElementById('overall-text');
          dot.className = 'overall-dot red';
          text.textContent = 'Unable to Reach Status API';
          document.getElementById('last-checked').textContent = 'Failed at ' + formatTime(new Date());
        }
      }
    }

    poll();
    setInterval(poll, 10000);
  </script>

</body>
</html>
